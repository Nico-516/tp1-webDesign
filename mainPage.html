<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Dog Breeds</h1>
  <p>Table to show the breeds of different types of dogs</p>
  <button>Update dog</button>
  <button>Delete dog</button>

  <form id="addDogForm">
    <label for="breedName">Breed:</label>
    <input type="text" id="breedName" name="breedName">
    <label for="breedDescription">Description:</label>
    <input type="text" id="breedDescription" name="breedDescription">
    <label for="breedLife">Life Span:</label>
    <input type="text" id="breedLife" name="breedLife">
    <label for="breedMaleWeight">Male max weight:</label>
    <input type="text" id="breedMaleWeight" name="breedMaleWeight">
    <label for="breedFemaleWeight">Female max weight:</label>
    <input type="text" id="breedFemaleWeight" name="breedFemaleWeight">
    <button type="submit" onclick="addDog()">Add dog</button>
  </form>
  <table border="1px">
    <thead>
      <tr>
        <th>Breed</th>
        <th>Description</th>
        <th>Life Span</th>
        <th>Male max weight</th>
        <th>Male min weight</th>
        <th>Female max weight</th>
        <th>Female min weight</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      
    </tbody>
  </table>
</body>
</html>

<script>
  async function fetchdata(){
    try{
      const response = await fetch("https://dogapi.dog/api/v2/breeds")
      console.log(response)
      if(!response.ok){
        throw new Error("Error en la peticion")
      }
      const data = await response.json()
      console.log(data)
      return data
    } catch (error){
      console.log(error)
      return null
    }
  }

  function createTable(data){
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = '';
    data.data.forEach(dog => {
      const row = document.createElement("tr");
      row.innerHTML = `
      <td>${dog.attributes.name}</td>
      <td>${dog.attributes.description}</td>
      <td>${dog.attributes.life.min}</td>
      <td>${dog.attributes.male_weight.max}</td>
      <td>${dog.attributes.male_weight.min}</td>
      <td>${dog.attributes.female_weight.max}</td>
      <td>${dog.attributes.female_weight.min}</td>
      `
      tableBody.appendChild(row)
    });
  }

  fetchdata().then(data => createTable(data));

  function addDog(){
    const name = document.getElementById("breedName").value;
    const description = document.getElementById("breedDescription").value;
    const life = document.getElementById("breedLife").value;
    const male_weight = document.getElementById("breedMaleWeight").value;
    const female_weight = document.getElementById("breedFemaleWeight").value;
    const tableBody = document.getElementById("tableBody");
    const row = document.createElement("tr");
    row.innerHTML = `
    <td>${name}</td>
    <td>${description}</td>
    <td>${life}</td>
    <td>${male_weight}</td>
    <td>${female_weight}</td>
    `
    tableBody.appendChild(row)
  }

  
</script>
